# ── Rate-limiting zones ───────────────────────────────────────────────────
# 10 MB shared zone; burst limit applied per client IP.
# "api_limit"  : general API endpoints   — 30 req/s per IP
# "heavy_limit": expensive AI endpoints  — 5 req/s per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m   rate=30r/s;
limit_req_zone $binary_remote_addr zone=heavy_limit:10m rate=5r/s;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ─────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"          always;
    add_header X-Frame-Options         "SAMEORIGIN"       always;
    add_header X-XSS-Protection        "1; mode=block"    always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── CORS — allow only localhost origins ──────────────────────────────
    # The backend FastAPI CORSMiddleware is the primary enforcement layer.
    # This provides defence-in-depth for browsers accessing the Nginx proxy.
    add_header Access-Control-Allow-Origin  "$http_origin" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;

    # ── Gzip compression ─────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;

    # ── CORS pre-flight ───────────────────────────────────────────────────
    location = /api/preflight {
        add_header Access-Control-Allow-Origin  "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
        add_header Content-Length 0;
        add_header Content-Type  text/plain;
        return 204;
    }

    # ── Proxy /api/reports/* and /api/graph/* (expensive AI paths) ───────
    location ~* ^/api/(reports|graph)/ {
        limit_req zone=heavy_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass         http://backend:8000;
        rewrite            ^/api(/.*)$ $1 break;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
    }

    # ── Proxy /api/* → FastAPI backend (standard paths) ──────────────────
    location /api/ {
        limit_req zone=api_limit burst=60 nodelay;
        limit_req_status 429;

        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;

        # Rewrite 307/308 Location so browser follows via /api/ prefix.
        # FastAPI redirects to http://<host>/<path>/ — prepend /api.
        proxy_redirect ~^(https?://[^/]+)(/.*)$ $1/api$2;
    }

    # ── SPA fallback — all unknown paths → index.html ────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache static assets aggressively ─────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
