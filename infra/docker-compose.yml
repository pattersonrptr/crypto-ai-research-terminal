services:
  # ── PostgreSQL 15 ────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: cryptoai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cryptoai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cryptoai}
      POSTGRES_DB: ${POSTGRES_DB:-cryptoai}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cryptoai} -d ${POSTGRES_DB:-cryptoai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cryptoai_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Ollama (local LLM) ───────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: cryptoai_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Remove the entire deploy block if no NVIDIA GPU is available
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ── Backend (FastAPI) ────────────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    container_name: cryptoai_backend
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cryptoai}:${POSTGRES_PASSWORD:-cryptoai}@postgres:5432/${POSTGRES_DB:-cryptoai}
      REDIS_URL: redis://redis:6379
      OLLAMA_BASE_URL: http://ollama:11434
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app/backend:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Frontend (React → nginx) ─────────────────────────────────────────────
  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
    container_name: cryptoai_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

  # ── DB seed (runs once; exits 0 when done or data already exists) ────────
  db-seed:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    container_name: cryptoai_db_seed
    restart: "no"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cryptoai}:${POSTGRES_PASSWORD:-cryptoai}@postgres:5432/${POSTGRES_DB:-cryptoai}
    command: ["python", "/app/backend/scripts/seed_data.py"]
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  ollama_data:
