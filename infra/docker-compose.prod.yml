# Production overrides for docker-compose.yml
#
# Usage:
#   docker compose -f infra/docker-compose.yml -f infra/docker-compose.prod.yml up -d
#
# What this file changes vs. the base compose:
#   - No bind-mount volumes for source code
#   - Resource limits on every service
#   - restart: always  (vs. unless-stopped in dev)
#   - No host-exposed ports for postgres / redis (internal only)
#   - LOG_LEVEL=info instead of debug

services:
  postgres:
    restart: always
    ports: []            # Remove host-exposed port; only reachable inside Docker network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"

  redis:
    restart: always
    ports: []            # Internal only
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  ollama:
    restart: always
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "2.00"

  backend:
    restart: always
    environment:
      LOG_LEVEL: info
      LOG_FORMAT: json
      ENVIRONMENT: production
    # No bind mounts — image already contains the code
    volumes: []
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.00"

  frontend:
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  db-seed:
    restart: "no"        # Runs once and exits — no restarts in prod
